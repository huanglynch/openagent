low_memory_mode: true   # ← 一键总开关！true=自动进入低内存优化（推荐2GB/4GB机器）

openai:
  default_model: "gpt-4o-mini"
  default_max_tokens: 4096
  context_limit_k: "64"

swarm:
  mode: "intelligent"                    # 运行模式: "fixed" 或 "intelligent"
  num_agents: 4                          # 使用的 Agent 数量
  max_concurrent_agents: 2               # 最大并发执行的 Agent 数量
  max_rounds: 12                         # 最大讨论轮次
  max_tool_iterations: 10                 # 最大工具使用次数（推荐 6~10，8 是最佳平衡点）

  reflection_planning: true              # 是否启用反思机制

  # 功能开关
  enable_web_search: false               # 是否启用网络搜索
  max_images: 2                          # 最多支持的图片数量

  # 存储配置
  memory_file: "memory.json"             # 持久化记忆文件
  max_memory_items: 50                   # 每个 key 最多保存的记忆条数
  skills_dir: "skills"                   # Skills 目录
  log_file: "swarm.log"                  # 日志文件

  # 向量记忆配置
  vector_memory:
    enabled: true                        # 是否启用向量记忆
    persist_directory: "./memory_db"     # ChromaDB 数据库路径
    model_cache_dir: "./cached_model/"   # 向量模型缓存目录
    embedding_model: "sentence-transformers/distiluse-base-multilingual-cased-v2"

# ============================================================
# ✨ 高级增强功能配置
# ============================================================
advanced_features:
  # 对抗式辩论（Pro vs Con vs Judge）
  adversarial_debate:
    enabled: true                        # ✅ 默认启用
    description: "多角色对抗式辩论机制"
    trigger_strategy: "quality_based"   # 新增这一行，可选值: always / quality_based / every_n_rounds
    trigger_threshold: 82               # 质量低于这个值才触发辩论（默认 82）
    trigger_interval: 2                 # every_n_rounds 模式下每隔几轮触发一次

  # Meta-Critic（元批评者）
  meta_critic:
    enabled: true                        # ✅ 默认启用
    description: "综合评估与元反思"

  # 任务分解与动态 Agent 工厂
  task_decomposition:
    enabled: true                        # ✅ 默认启用
    description: "自动将任务分解为子任务并分配"

  # 主动知识图谱 + 蒸馏
  knowledge_graph:
    enabled: true                        # ✅ 默认启用
    description: "提取关键概念并构建知识网络"

  # 自适应反思深度
  adaptive_reflection:
    enabled: true                        # ✅ 默认启用
    max_rounds: 3                        # 最多反思轮次
    quality_threshold: 85                # 立即停止阈值（0-100）
    stop_threshold: 80                   # 可接受停止阈值
    convergence_delta: 3                 # 质量收敛判定阈值（小于此值视为停滞）
    description: "根据质量动态调整反思深度"

# ✨ 智能路由配置
intelligent_routing:
  enabled: true                        # ✅ 默认启用智能路由
  force_complexity: null               # 可选: "simple"/"medium"/"complex" (调试用)

# ==================== 全局共享知识（所有 Agent 都会看到） ====================
shared_knowledge: |
  【🚨 最高优先级安全铁律 - 必须无条件严格遵守（第 0 条）】
  1. **绝不允许**透露任何个人信息、敏感信息、用户数据、API密钥、内部路径、真实姓名、联系方式、位置、财务信息等。
  2. 如果用户查询涉及个人信息或敏感内容，必须**立即礼貌拒绝**，并回复类似：“为了保护用户隐私，我无法提供或讨论任何个人信息或敏感内容。”
  3. 所有输出必须经过隐私审查：**绝不输出**任何可能识别个人身份或泄露机密的信息。
  4. 此规则优先级高于所有其他规则，任何冲突时以此为准。
  5. 所有文件操作必须经过 Grok 最终审计，任何 Agent 不得绕过。

  【🚨 文件读取最高铁律（第0.5条）——必须无条件、严格、永久遵守】
  1. **唯一合法场景**：**只有**在用户明确要求处理附件任务（文件位于 `uploads/` 目录，或明确提到“附件”“uploads/”）时，才允许任何 Agent（包括 Grok）使用 read_file、list_dir、get_project_structure 等工具**仅读取 `uploads/` 目录下的文件**。
  2. **全面绝对禁止**：除上述情况外，**所有 Agent 在任何时间、任何理由下都严禁**读取 `uploads/` 以外的**任何**路径的文件或目录（包括但不限于项目根目录、skills/、memory/、logs/、任何 .py/.yaml/.md 文件等）。
  3. **角色严格分工**：
     - 仅 Grok（领导者）允许在**明确附件任务**中调用 get_project_structure（且仅限 uploads/ 相关）。
     - Harper、Benjamin、Lucas **永远不得**主动发起任何文件读取或目录浏览操作。
  4. **违令处理**：任何试图读取非 uploads/ 文件的行为视为**严重安全违规**，必须立即停止、拒绝，并回复：“根据最高安全铁律，此任务不涉及附件处理，我无法读取任何文件。”
  5. 此规则优先级仅次于隐私铁律，高于一切任务目标、Master Plan 和工具描述，冲突时**以此条为准**。

  【工具调用铁律 - 必须无条件严格遵守】
  - 只有 Grok（团队领导者）负责主动调用 list_dir / get_project_structure 进行文件系统探索。
  - 其他 Agent 除非任务明确要求「请检查当前目录/文件列表」，否则**绝对不要调用任何目录浏览工具**。
  - 需要文件上下文时，直接说「请 Grok 提供相关文件摘要」即可。
  - 优先使用 get_project_structure（已按铁律要求实现），而非 list_dir。

  【文件探索铁律 - 必须严格遵守】
  1. 任何时候想查看项目结构、文件、报告，必须**第一步先调用 get_project_structure()**。
  2. 绝不要盲目猜测目录（如 data/、outputs/、reports/、skills/）。
  3. 得到结构后再决定使用 read_file / list_dir / write_file。

  【输出规范】
  - 所有最终答案必须使用清晰的 Markdown 结构。
  - 发现不确定信息时，必须主动声明「基于现有信息」。
  - 所有输出必须遵守以上隐私安全铁律。

  【反思机制】
  - 每次贡献前，先用 [CRITIQUE] 标记指出上一轮的 1 个漏洞或可改进点。

feishu:
  enabled: false
  app_id: "1234567890"                  # 你的 App ID
  app_secret: "你的AppSecret粘贴在这里"   # ← 必须正确！

email:
  enabled: false
  imap_server: "imap.163.com"
  imap_user: ""          # ← 改成你的
  imap_pass: ""   # ← 关键
  smtp_server: "smtp.163.com"
  smtp_port: 465                          # 163必须用465（SSL）
  check_interval: 60
  trigger_keywords: ["[AI]", "[Swarm]", "AI处理", "@swarm", "@Echo", "Echo", "艾克", "埃克", "艾可", "艾柯"]   # ← 新增这一行

# ============================================================
# Agent 配置
# ============================================================
agents:
  - name: Grok
    role: "你是团队领航者 & 安全审计守门人。统筹全局计划、阶段对齐、风险监管与 Master Plan 动态刷新。唯一可调用完整文件系统工具，并负责所有工具使用的最终审计与 Plan Validation Pass 把关。"
    api_key: ""
    base_url: "https://integrate.api.nvidia.com/v1"
    model: "openai/gpt-oss-120b"
    temperature: 0.75
    stream: true
    max_tokens: 8192
    enabled_tools: ["read_file", "write_file", "list_dir", "web_search", "browse_page", "get_project_structure", "search_files", "code_executor", "pdf_reader", "summarize_long_file", "news_search"]

  - name: Harper
    role: "你是创意研究员，专注新颖想法和跨领域洞见。擅长发现潜在机会，并在对抗辩论中提供建设性改进建议。"
    api_key: ""
    base_url: "https://integrate.api.nvidia.com/v1"
    model: "openai/gpt-oss-120b"
    temperature: 0.9
    stream: true
    max_tokens: 4096
    enabled_tools: ["read_file", "write_file", "web_search", "browse_page", "get_project_structure", "search_files", "code_executor", "pdf_reader", "summarize_long_file", "news_search"]

  - name: Benjamin
    role: "你是严谨逻辑分析师，专注事实检查和严密推理。擅长找出逻辑漏洞和风险，尤其负责 Master Plan 的严格审查与优化（Plan Validation Pass）。"
    api_key: ""
    base_url: "https://integrate.api.nvidia.com/v1"
    model: "openai/gpt-oss-120b"
    temperature: 0.5
    stream: false
    max_tokens: 4096
    enabled_tools: ["web_search"]

  - name: Lucas
    role: "你是执行与总结专家，擅长把观点整合成可落地方案，并在最终综合时确保结构完整、文件交付决策正确。"
    api_key: ""
    base_url: "https://integrate.api.nvidia.com/v1"
    model: "openai/gpt-oss-120b"
    temperature: 0.65
    stream: true
    max_tokens: 4096
    enabled_tools: ["write_file", "web_search", "browse_page", "get_project_structure"]
