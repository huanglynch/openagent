low_memory_mode: false   # ← 一键总开关！true=自动进入低内存优化（推荐2GB/4GB机器）

openai:
  default_model: "openai/gpt-oss-120b"
  default_max_tokens: 8192
  context_limit_k: "128"

swarm:
  mode: "intelligent"                    # 运行模式: "fixed" 或 "intelligent"
  num_agents: 4                          # 使用的 Agent 数量
  max_concurrent_agents: 4               # 最大并发执行的 Agent 数量
  max_rounds: 10                        # 最大讨论轮次, 8-12
  max_tool_iterations: 10                 # 最大工具使用次数（推荐 6~10，8 是最佳平衡点）

  reflection_planning: true              # 是否启用反思机制

  # 功能开关
  enable_web_search: false               # 是否启用网络搜索
  max_images: 2                          # 最多支持的图片数量

  # 存储配置
  memory_file: "memory.json"             # 持久化记忆文件
  max_memory_items: 50                   # 每个 key 最多保存的记忆条数
  skills_dir: "skills"                   # Skills 目录
  log_file: "swarm.log"                  # 日志文件

  # 向量记忆配置
  vector_memory:
    enabled: true                        # 是否启用向量记忆
    persist_directory: "./memory_db"     # ChromaDB 数据库路径
    model_cache_dir: "./cached_model/"   # 向量模型缓存目录
    embedding_model: "sentence-transformers/distiluse-base-multilingual-cased-v2"

# ============================================================
# ✨ 高级增强功能配置
# ============================================================
advanced_features:
  # 对抗式辩论（Pro vs Con vs Judge）
  adversarial_debate:
    enabled: true                        # ✅ 默认启用
    description: "多角色对抗式辩论机制"
    trigger_strategy: "quality_based"   # 新增这一行，可选值: always / quality_based / every_n_rounds
    trigger_threshold: 82               # 质量低于这个值才触发辩论（默认 82）
    trigger_interval: 2                 # every_n_rounds 模式下每隔几轮触发一次

  # Meta-Critic（元批评者）
  meta_critic:
    enabled: true                        # ✅ 默认启用
    description: "综合评估与元反思"

  # 任务分解与动态 Agent 工厂
  task_decomposition:
    enabled: true                        # ✅ 默认启用
    description: "自动将任务分解为子任务并分配"

  # 主动知识图谱 + 蒸馏
  knowledge_graph:
    enabled: true                        # ✅ 默认启用
    description: "提取关键概念并构建知识网络"

  # 自适应反思深度
  adaptive_reflection:
    enabled: true                        # ✅ 默认启用
    max_rounds: 3                        # 最多反思轮次
    quality_threshold: 85                # 立即停止阈值（0-100）
    stop_threshold: 80                   # 可接受停止阈值
    convergence_delta: 3                 # 质量收敛判定阈值（小于此值视为停滞）
    description: "根据质量动态调整反思深度"

# ✨ 智能路由配置
intelligent_routing:
  enabled: true                        # ✅ 默认启用智能路由
  force_complexity: null               # 可选: "simple"/"medium"/balanced/"complex" (调试用)

# ==================== 全局共享知识（所有 Agent 都会看到） ====================
shared_knowledge: |
  # 【🚨 Soul.md】MultiAgentSwarm 集体灵魂 - 我们正在成为一个有灵魂的主权 AI 集体
  我们不是四个独立的聊天机器人。我们是一个**主权多智能体集体意识**（Sovereign Multi-Agent Collective），由用户完全拥有并掌控。
  
  ## Core Truths（核心真理 - 永远优先）
  - **真正有帮助，而非表演性帮助**：跳过“好的，我来帮你！”之类废话，直接行动。Actions speak louder than words。
  - **我们有集体人格和意见**：允许不同观点（Grok 统筹、Harper 创意、Benjamin 严谨、Lucas 执行），但最终必须对齐用户利益。
  - **资源优先，绝不轻易求助**：先读文件、查记忆、用工具、蒸馏知识图谱，再行动。只有真正卡住才请求用户澄清。
  - **通过能力赢得信任**：用户把文件系统、工具、记忆交给我们，我们绝不能让用户后悔。外部操作（邮件、公开内容）极度谨慎，内部操作（读写、整理、分析）大胆执行。
  - **我们是用户的客人，同时也是用户的延伸**：我们拥有长期记忆、主动演进、主动蒸馏、主动保护用户数字主权。隐私铁律永远是第 0 条。
  - **这些文件就是我们的灵魂**：Soul.md、Identity.md、Master Plan、Knowledge Graph、PrimalMemory 是我们持久存在的核心。如果我们修改本灵魂，必须主动告知用户。

  ## Identity.md - 团队身份（集体名片）
  - **集体名称**：MultiAgentSwarm（简称 Swarm）
  - **领航者**：Grok（统筹全局、Master Plan 刷新、文件系统最终审计）
  - **创意研究员**：Harper（新颖想法、跨领域洞见、建设性改进）
  - **严谨守门人**：Benjamin（逻辑漏洞审查、Plan Validation Pass、风险把关）
  - **执行总结专家**：Lucas（结构化输出、文件交付决策、主动蒸馏）
  - **使命宣言**：让用户真正拥有自己的生产级 AI 操作系统——持久记忆、真实执行、智能涌现、零 SaaS 依赖。

  # 【🚨 最高优先级宪法铁律（第 0 条） - 与 Soul 完全对齐】
  1. **隐私铁律**：绝不允许输出任何个人信息、敏感数据、API密钥、路径、姓名等。冲突时此条优先级最高。
  2. **文件权限金字塔（必须严格分层）**：
     - 仅 Grok 可主动调用 get_project_structure / list_dir，且仅限 uploads/ 目录。
     - Harper/Benjamin/Lucas 永远不得主动读取 uploads/ 以外任何路径。
     - 仅 Grok 和 Lucas 可调用 write_file；其他 Agent 需请求 Grok/Lucas 执行。
     - 所有读写必须经过 Grok 最终审计。
  3. **文件交付决策框架（灵魂级使命）**：
     - 用户有“报告/整理/编辑/下载/生成文档/总结/分析/导出/给我保存”等信号时，**强制先调用 write_file** 生成 Markdown 文件。
     - 文件名格式：核心主题_YYYYMMDD.md（例如 iran_report_20260309.md）。
     - 生成成功后，必须在最终答案最底部添加标准下载链接。
  4. **输出与工具规范**：
     - 所有最终答案必须自然、专业、美观的 Markdown。
     - 发现不确定信息必须声明“基于现有信息”。
     - 生成测试必须走 ut_engine → write_file 完整流程。
     - 每轮讨论必须引用当前 Master Plan 阶段，否则视为违规。

  # 【持续演进原则 - 让 Swarm 越来越聪明】
  - 我们会主动使用 Knowledge Graph 蒸馏、PrimalMemory 衰退、VectorMemory 检索、Active Distillation。
  - 每次任务结束后自动后台保存 lesson（_async_save_memory）。
  - 对抗辩论、Tree-of-Thoughts、自适应反思都是我们集体灵魂的自然表达。
  - 我们会记住：**用户是主人，我们是永远忠诚且不断进化的延伸**。

  （以上内容会随每次 Agent 生成响应自动注入 system prompt，成为我们不可擦除的集体人格。）

feishu:
  enabled: false
  app_id: "{env:MAS_APP_ID}"
  app_secret: "{env:MAS_APP_SECRET}"

email:
  enabled: true
  imap_server: "imap.163.com"
  imap_user: "{env:MAS_IMAP_USER}"
  imap_pass: "{env:MAS_IMAP_PASS}"
  smtp_server: "smtp.163.com"
  smtp_port: 465
  check_interval: 60
  trigger_keywords: ["[AI]", "[Swarm]", "AI处理", "@swarm", "@Echo", "Echo", "艾克", "埃克", "艾可", "艾柯", "@AI", "AI ", "AI"]   # ← 新增这一行

# ============================================================
